<!doctype html>
<html lang="en">

      content="Botal transforms discarded glass bottles into handcrafted lamps, dispensers, planters, decor pieces, gifting products, and custom installations in Nagpur, India."

    <meta property="og:image" content="./assets/botal-logo.jpg" />
    <link rel="icon" href="./assets/botal-logo.jpg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind = {
        config: {
          theme: {
            extend: {
              colors: {
                botalYellow: "#FFF44F",
                olive: "#6B8E23",
                deepOlive: "#556B2F",
                cream: "#FFFDF2",
                ink: "#222222",

              fontFamily: {

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" data-presets="env,react" src="./src/app.jsx"></script>
